name: ✨ 功能建议
description: 提出新功能或改进想法
labels: [enhancement]
body:
    - type: textarea
      id: problem
      attributes:
          label: 要解决的问题
          description: 你遇到的场景 / 痛点是什么？
      validations:
          required: true
    - type: textarea
      id: proposal
      attributes:
          label: 期望的方案
          description: 你希望 wink-sftp 怎么做？CLI / 配置长什么样？
      validations:
          required: true
    - type: textarea
      id: alternatives
      attributes:
          label: 备选方案
          description: 你考虑过的其他做法或现有绕行方式
    - type: dropdown
      id: roadmap
      attributes:
          label: 是否已在路线图
          description: 请先查阅 docs/ROADMAP.md
          options:
              - 不确定
              - 路线图中已有相关项
              - 路线图未覆盖
      validations:
          required: true
