name: Release

on:
    push:
        tags:
            - 'v*'

# OIDC 可信发布 + provenance 溯源需 id-token 写权限（仓库须公开）；创建 GitHub Release 需 contents 写权限
permissions:
    contents: write
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # changelogen 需要完整 git 历史与 tag

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm run lint:check

            - name: Typecheck
              run: pnpm run typecheck

            - name: Test
              run: pnpm test

            - name: Build
              run: pnpm run build

            # OIDC 可信发布需要 npm >= 11.5.1（Node 22 自带的 npm 10 不支持）
            - name: Upgrade npm for trusted publishing
              run: npm install -g npm@latest

            # 无需 token：在 npmjs.com 为本包配置 GitHub Actions 可信发布者后，
            # npm 凭 OIDC 自动鉴权并生成 provenance 溯源
            - name: Publish to npm (OIDC trusted publishing)
              run: npm publish --access public

            # 读取 CHANGELOG.md 顶部版本区段，创建对应的 GitHub Release（发布公告）
            - name: Create GitHub Release
              run: pnpm exec changelogen gh release --token "$GITHUB_TOKEN"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
